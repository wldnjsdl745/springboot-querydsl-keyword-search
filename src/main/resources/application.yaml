spring:
  application:
    name: querydsl-practice

  jpa:
    show-sql: true
    properties:
      hibernate:
        ddl-auto: update
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

  datasource:
    url: "jdbc:mysql://localhost/article"
    username: "root"
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

